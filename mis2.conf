server {
    listen 448 ssl;
    http2 on;
    server_name mis2.lby.co.nz;
    # SSL证书配置（从default.conf迁移至此）
    ssl_certificate     /etc/nginx/cert/lby.co.nz.cert.pem;
    ssl_certificate_key /etc/nginx/cert/lby.co.nz.key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 客户端请求大小限制
    client_max_body_size 1000M;
    
    root /var/www/mis2/public;

    # WebSocket
    location ^~ /ws/ {
        access_log /var/log/nginx/ws_debug.log;
        proxy_pass http://127.0.0.1:8031/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # API 接口
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8030/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ===============================
    # 上传文件静态资源
    # /storage/xxx.pdf → /opt/ForguncySites/ForguncyServer/lbymis/Upload/xxx.pdf
    # ^~ 优先级高于正则 location，nginx 直接服务，不走 Worker
    # ===============================
    location ^~ /storage/ {
        alias /opt/ForguncySites/ForguncyServer/lbymis/Upload/;

        # CORS - 允许本地开发跨域 (localhost:xxxx)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, batoken, Range" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range, Accept-Ranges" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS";
            add_header Access-Control-Allow-Headers "Origin, Content-Type, Accept, Authorization, batoken, Range";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type "text/plain";
            return 204;
        }

        types {
            application/pdf  pdf;
            image/jpeg       jpg jpeg;
            image/png        png;
            image/gif        gif;
            image/webp       webp;
            image/bmp        bmp;
            image/svg+xml    svg svgz;
            image/x-icon     ico;
        }
        default_type application/octet-stream;

        expires 7d;
        add_header Cache-Control "public, no-transform";
        access_log off;

        # 安全：禁止脚本执行
        location ~* \.(php|php5|phtml|jsp|sh|cgi|pl|py|asp|aspx)$ {
            deny all;
        }
    }

    # ===============================
    # 🔥 前端缓存策略（关键）
    # ===============================

    # 1. 禁用 index.html 缓存（确保更新生效）
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 2. 对 assets/ 使用永久缓存（Vite hash 文件安全）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 3. 其他 js/css 也长缓存（如没有 hash 可移除）
    location ~* \.(js|css|mjs)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ===============================
    # Vue3 SPA 路由支持
    # ===============================
    location / {
        index index.html index.php error/index.html;

        set $server 0;
        if ($request_uri ~* "server=1") {
            set $server 1;
        }
        if ($http_server) {
            set $server 1;
        }
        if ($server = 1) {
            rewrite  ^(.*)$  /index.php?s=/$1  last;
            break;
        }

        try_files $uri $uri/ /index.html;
    }

    location ~* \.mjs$ {
    	add_header Content-Type application/javascript;
    }
}


server {
    listen 8080;
    server_name mis2.lby.co.nz;
    return 301 https://mis2.lby.co.nz;
}
